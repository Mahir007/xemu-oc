name: Release

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to build and release"
        required: true
        type: string
      tag:
        description: "Tag name for the release"
        required: true
        type: string

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ inputs.ref }}

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    steps:
    - name: Compute upstream version info
      id: upstream
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        upstream_tag="${{ inputs.tag }}"
        upstream_tag="${upstream_tag%-oc}"
        echo "tag=${upstream_tag}" >> $GITHUB_OUTPUT

        echo "short_sha=$(echo "${{ github.sha }}" | cut -c1-7)" >> $GITHUB_OUTPUT

        prev_release=$(gh release list --repo "${{ github.repository }}" \
          --limit 10 --json tagName --jq '.[].tagName' \
          | grep -- '-oc$' \
          | grep -v "^${{ inputs.tag }}$" \
          | head -n 1)
        prev_tag="${prev_release%-oc}"
        echo "prev_tag=${prev_tag}" >> $GITHUB_OUTPUT
    - name: Download artifacts
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
      with:
        path: dist
        merge-multiple: true
    - name: Create release
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
      with:
        name: ${{ inputs.tag }}
        tag_name: ${{ inputs.tag }}
        draft: false
        prerelease: false
        body: |
          ## Custom xemu-oc build
          [${{ steps.upstream.outputs.tag }}](https://github.com/xemu-project/xemu/releases/tag/${{ steps.upstream.outputs.tag }}) with the following PR applied on top:

          - [xemu-project/xemu#2028](https://github.com/xemu-project/xemu/pull/2028) - UX: Add CPU overclock and display rate override settings
            - Adds configurable CPU clock and display rate overrides to the settings UI
            - Can improve framerates in many games that benefit from running above 30/60 FPS

          > [!WARNING]
          > **Use at your own risk.** Games with FPS-dependent physics may break with these overrides enabled.
          >
          > - **Do NOT report bugs caused by this build to the upstream xemu project!**
          > This is an unofficial fork and any issues should not be filed on the main xemu repository.
          > - This build is provided as-is with no support. I am not able to help with issues you encounter.

          Built from commit: [`${{ steps.upstream.outputs.short_sha }}`](https://github.com/Mahir007/xemu-oc/commit/${{ github.sha }})
          Full upstream changelog: [${{ steps.upstream.outputs.prev_tag }}...${{ steps.upstream.outputs.tag }}](https://github.com/xemu-project/xemu/compare/${{ steps.upstream.outputs.prev_tag }}...${{ steps.upstream.outputs.tag }})
        files: |
          dist/xemu*-win*.zip
          dist/xemu*-macos-arm64*.zip
          dist/xemu*-linux*.zip
